serenity {
    encoding = "UTF-8"
    report.encoding = "UTF-8"
    compress.filenames = true
    # Nivel de log para que en el reporte aparezcan los detalles de Request/Response
    logging = VERBOSE
}

restapi {
    baseurl = "https://petstore.swagger.io/v2"
}

serenity {
    console.colors = true
    # Muestra los pasos de la API en el reporte detallado
    verbose.steps = true
}
